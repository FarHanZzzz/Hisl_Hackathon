version: '3.8'

services:
  # Backend API
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./uploads:/app/uploads
      - ./results:/app/results
      - ./models:/app/models
    environment:
      - PYTHONUNBUFFERED=1
    depends_on:
      - redis
    networks:
      - pedi-growth-network

  # Worker Service
  worker:
    build:
      context: .
      dockerfile: worker/Dockerfile
    volumes:
      - ./uploads:/app/uploads
      - ./results:/app/results
      - ./models:/app/models
    environment:
      - PYTHONUNBUFFERED=1
    depends_on:
      - redis
    networks:
      - pedi-growth-network

  # Frontend (Next.js)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend
    networks:
      - pedi-growth-network

  # Redis (Message Queue)
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - pedi-growth-network

networks:
  pedi-growth-network:
    driver: bridge

volumes:
  uploads:
  results:
